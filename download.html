<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6B7FD8" />
    <title>Download VibeCV - AI Resume Builder</title>
    <meta
      name="description"
      content="Download VibeCV - Create professional resumes with AI in minutes. Available on App Store and Google Play."
    />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #eff1fc 0%,
          #e0e3f9 30%,
          #c2c9f3 70%,
          #e8eaf8 100%
        );
        font-family: "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .download-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        max-width: 400px;
        width: 100%;
      }

      .logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(107, 127, 216, 0.25);
        margin-bottom: 8px;
      }

      .app-name {
        font-size: clamp(24px, 6vw, 32px);
        font-weight: 700;
        color: #1a1f4b;
        text-align: center;
        line-height: 1.2;
      }

      .app-tagline {
        font-size: clamp(14px, 3.5vw, 16px);
        color: #4852ab;
        text-align: center;
        line-height: 1.4;
      }

      .download-buttons {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        max-width: 280px;
        align-items: center;
        justify-content: center;
      }

      .download-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 16px 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
      }

      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      .download-btn:active {
        transform: translateY(0);
      }

      .download-btn img {
        display: block;
        height: 48px;
        width: auto;
      }

      .download-btn-apple img {
        height: 40px;
      }

      .download-btn-google { 
      }

      .download-btn-apple { 
      }

      .home-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: inherit;
      }
      .home-link:hover {
        opacity: 0.9;
      }
    </style>

    <main class="download-container">
      <a href="index.html" class="home-link">

        <h1 class="app-name">VibeCV</h1>
      </a>
      <p class="app-tagline">
        Create professional resumes with AI in minutes. Download now for free.
      </p>

      <div class="download-buttons">
        <a
          href="https://apps.apple.com/in/app/ai-resume-builder-vibecv/id6759809791"
          target="_blank"
          rel="noopener noreferrer"
          class="download-btn download-btn-apple"
          onclick="gtag('event', 'download_click', { event_category: 'engagement', event_label: 'app_store', page: 'download' });"
        >
          <img src="app-store.svg" alt="Download on the App Store" />
        </a>
        <a
          href="https://play.google.com/store/apps/details?id=com.deep125.vibecv"
          target="_blank"
          rel="noopener noreferrer"
          class="download-btn download-btn-google"
          onclick="gtag('event', 'download_click', { event_category: 'engagement', event_label: 'google_play', page: 'download' });"
        >
          <img src="google-play-download.svg" alt="Get it on Google Play" />
        </a>
      </div>
    </main>

<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4PSNHHGF4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-P4PSNHHGF4');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Download VibeCV - AI Resume Builder</title>
    <meta
      name="description"
      content="Download VibeCV - Create professional resumes with AI in minutes. Available on App Store and Google Play."
    />
    <link rel="icon" type="image/png" href="logo.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100vh;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .download-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        max-width: 400px;
        width: 100%;
      }

      .app-name {
        font-size: clamp(24px, 6vw, 32px);
        font-weight: 700;
        color: #1a1a1a;
        text-align: center;
        line-height: 1.2;
      }

      .app-tagline {
        font-size: clamp(14px, 3.5vw, 16px);
        color: #6b7280;
        text-align: center;
        line-height: 1.4;
      }

      .download-buttons {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        max-width: 280px;
      }

      .download-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 16px 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
      }

      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      .download-btn:active {
        transform: translateY(0);
      }

      .download-btn img {
        display: block;
        height: 48px;
        width: auto;
      }

      .download-btn-apple img {
        height: 40px;
      }

      .download-btn-google {
        background: #000000;
      }

      .download-btn-apple {
        background: #000000;
      }
    </style>
  </head>
  <body>
    <main class="download-container">
      <h1 class="app-name">VibeCV</h1>
      <p class="app-tagline">
        Create professional resumes with AI in minutes. Download now for free.
      </p>

      <div class="download-buttons">
        <a
          href="https://apps.apple.com/in/app/ai-resume-builder-vibecv/id6759809791"
          target="_blank"
          rel="noopener noreferrer"
          class="download-btn download-btn-apple"
        >
          <img src="app-store.svg" alt="Download on the App Store" />
        </a>
        <a
          href="https://play.google.com/store/apps/details?id=com.deep125.vibecv"
          target="_blank"
          rel="noopener noreferrer"
          class="download-btn download-btn-google"
        >
          <img src="google-play-download.svg" alt="Get it on Google Play" />
        </a>
      </div>
    </main>
  </body>
</html>
